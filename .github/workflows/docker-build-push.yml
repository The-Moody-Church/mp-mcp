name: Build, Scan, and Push Docker Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-scan-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Audit npm dependencies
        run: npm audit --audit-level=critical

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        if: github.actor != 'dependabot[bot]'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push with SHA tag
        if: github.actor != 'dependabot[bot]'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/the-moody-church/mp-mcp:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build only (Dependabot)
        if: github.actor == 'dependabot[bot]'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false

      - name: Scan image with Trivy
        if: github.actor != 'dependabot[bot]'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/the-moody-church/mp-mcp:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore

      - name: Push latest tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker buildx imagetools create \
            ghcr.io/the-moody-church/mp-mcp:${{ github.sha }} \
            --tag ghcr.io/the-moody-church/mp-mcp:latest
