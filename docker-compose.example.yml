services:
  mp-mcp:
    image: ghcr.io/the-moody-church/mp-mcp:latest
    # Or build locally:
    # build: .
    ports:
      - "3000:3000"
    environment:
      MP_BASE_URL: https://your-church.ministryplatform.com
      OIDC_CLIENT_ID: ""
      OIDC_CLIENT_SECRET: ""
      PUBLIC_URL: https://your-mcp-domain.example.com
      PORT: "3000"
      SESSION_SECRET: ""  # generate with: openssl rand -hex 32
    volumes:
      - ./config/table-access.json:/app/config/table-access.json:ro
    restart: unless-stopped
